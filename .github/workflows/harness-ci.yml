name: harness-ci

on:
  pull_request:
  push:
    branches: ["main", "master", "dev"]
  workflow_dispatch:

jobs:
  governance-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Run drift CI checks
        run: bash scripts/drift-ci.sh

      - name: Upload doc gardening report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-gardening-report
          path: docs/generated/doc-gardening-report.md
          if-no-files-found: ignore
