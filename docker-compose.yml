services:
  postgres:
    image: postgres:16
    container_name: iip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: insurance_integration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insurance_integration"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insurance-integration-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/insurance_integration
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
      OPERATOR_USERNAME: operator
      OPERATOR_PASSWORD: operator1234
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

volumes:
  postgres_data:
