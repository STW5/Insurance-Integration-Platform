spring.application.name=Insurance-Integration-Platform

# PostgreSQL (prototype default)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/insurance_integration}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Prototype security accounts
app.security.admin.username=${ADMIN_USERNAME:admin}
app.security.admin.password=${ADMIN_PASSWORD:admin1234}
app.security.operator.username=${OPERATOR_USERNAME:operator}
app.security.operator.password=${OPERATOR_PASSWORD:operator1234}

server.error.include-message=always
